<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Reveal Presenter</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            color: #fff;
            font-family: sans-serif;
        }

        .presenter-root {
            position: fixed;
            inset: 0;
        }

        .presenter-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #111;
        }

        .presenter-empty {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.75;
            pointer-events: none;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
<div class="presenter-root">
    <iframe class="presenter-frame" title="Reveal presenter frame"></iframe>
    <div class="presenter-empty">Waiting for deck from widget…</div>
</div>

<script>
(function () {
    const frame = document.querySelector('.presenter-frame');
    const emptyState = document.querySelector('.presenter-empty');

    function loadDeck(deck) {
        if (!deck || !deck.content) return;

        if (deck.type === 'html') {
            frame.removeAttribute('src');
            frame.srcdoc = deck.content;
        } else {
            frame.srcdoc = '';
            frame.src = deck.content;
        }

        emptyState.style.display = 'none';
    }

    function parseDeckFromQuery() {
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        if (src) {
            return { type: 'url', content: src };
        }

        const html = params.get('html');
        if (html) {
            return { type: 'html', content: html };
        }

        return null;
    }

    window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin || !event.data) return;

        if (event.data.type === 'reveal-presenter-load') {
            loadDeck(event.data.deck);
        }

        if (event.data.type === 'reveal-nav' && frame.contentWindow) {
            frame.contentWindow.postMessage({
                type: 'reveal-nav',
                direction: event.data.direction
            }, '*');
        }
    });

    const initialDeck = parseDeckFromQuery();
    if (initialDeck) {
        loadDeck(initialDeck);
    }

    if (window.opener) {
        window.opener.postMessage({ type: 'reveal-presenter-ready' }, window.location.origin);
    }

    window.addEventListener('beforeunload', () => {
        if (window.opener) {
            window.opener.postMessage({ type: 'reveal-presenter-closed' }, window.location.origin);
        }
    });
})();
</script>
</body>
</html>
