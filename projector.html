<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Screen – Projector View</title>

    <!-- Stylesheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">

    <!-- External Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
</head>
<body class="projector-view theme-professional">
    <div id="projector-edit-controls" class="projector-edit-controls" aria-live="polite" hidden>
        <span id="projector-edit-status" class="projector-edit-status">Edit: ON</span>
        <button id="projector-edit-done" type="button" class="projector-edit-button">Done</button>
        <button id="projector-reset-last-change" type="button" class="projector-edit-button projector-edit-reset">Reset last change</button>
    </div>
    <div id="app-container" class="app-container" style="margin-top: 0; height: 100vh;">
        <section id="student-view" class="view student-view" role="region" aria-label="Projector View">
            <div id="widgets-container" class="widgets-grid">
                <!-- Widgets are dynamically added here by JavaScript -->
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/projector.js"></script>

    <style>
        /* Projector View Overrides */
        .projector-view:not(.edit-mode) .widget-header {
            display: none !important;
        }

        .projector-view:not(.edit-mode) .resize-handle {
            display: none !important;
        }

        .projector-view.edit-mode .resize-handle {
            display: block;
        }

        .projector-view.edit-mode .widget {
            outline: 2px dashed rgba(255,255,255,0.4);
        }

        .projector-view .widget {
            box-shadow: none;
        }
    </style>
</body>
</html>
